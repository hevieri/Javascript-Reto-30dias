<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Día 13 - To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; }
    input, button { padding: 0.5rem; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; padding: 0.5rem; margin: 0.25rem 0; background: #ecf0f1; }
    li.completada { text-decoration: line-through; opacity: 0.6; }
    button.eliminar { background: #e74c3c; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Lista de Tareas</h1>
  <input type="text" id="tareaInput" placeholder="Nueva tarea...">
  <button id="btnAgregar">Agregar</button>
  <ul id="listaTareas"></ul>

  <script src="script.js"></script>
</body>
</html>

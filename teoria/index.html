<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Días de JavaScript — Lecciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1a1a3e;
      border-right: 1px solid #2a2a5e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar h1 {
      font-size: 1.1rem;
      padding: 1.2rem;
      background: #252550;
      border-bottom: 1px solid #2a2a5e;
      text-align: center;
    }
    .sidebar h1 span { color: #f7df1e; }
    .dia-lista {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .dia-item {
      padding: 0.7rem 1rem;
      margin: 0.2rem 0;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dia-item:hover { background: #2a2a5e; }
    .dia-item.activo { background: #3a3a7e; border-left: 3px solid #f7df1e; }
    .dia-num {
      background: #2a2a5e;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .dia-item.activo .dia-num { background: #f7df1e; color: #1a1a3e; }
    .dia-check {
      margin-left: auto;
      color: #2a2a5e;
      font-size: 0.8rem;
    }
    .dia-check.completado { color: #2ecc71; }

    /* Progreso */
    .progreso-bar {
      padding: 1rem;
      border-top: 1px solid #2a2a5e;
    }
    .progreso-bar .barra {
      height: 6px;
      background: #2a2a5e;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progreso-bar .llenado {
      height: 100%;
      background: linear-gradient(90deg, #f7df1e, #f39c12);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .progreso-bar .texto { font-size: 0.8rem; color: #888; text-align: center; }

    /* Contenido */
    .contenido {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 3rem;
    }
    .contenido h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #f7df1e;
    }
    .contenido .subtitulo {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .contenido h3 {
      font-size: 1.2rem;
      margin: 1.5rem 0 0.8rem;
      color: #fff;
    }
    .contenido p {
      line-height: 1.7;
      margin-bottom: 1rem;
      color: #ccc;
    }
    .contenido code {
      background: #1a1a3e;
      padding: 0.15rem 0.4rem;
      border-radius: 0.3rem;
      font-size: 0.9em;
      color: #f7df1e;
    }
    .contenido pre {
      background: #1a1a3e;
      padding: 1.2rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 1rem 0;
      border: 1px solid #2a2a5e;
      font-size: 0.9rem;
    }
    .contenido pre code {
      background: none;
      padding: 0;
      color: #e0e0e0;
    }
    .contenido ul, .contenido ol {
      margin: 0.5rem 0 1rem 1.5rem;
      line-height: 1.7;
      color: #ccc;
    }
    .contenido li { margin-bottom: 0.3rem; }
    .contenido .destacado {
      background: #252550;
      border-left: 3px solid #f7df1e;
      padding: 1rem;
      border-radius: 0 0.5rem 0.5rem 0;
      margin: 1rem 0;
    }
    .scroll-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f7df1e;
      color: #1a1a3e;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .scroll-top.visible { display: flex; }

    @media (max-width: 640px) {
      .sidebar { width: 60px; }
      .sidebar h1 { font-size: 0; }
      .sidebar h1::before { content: "JS"; font-size: 1.2rem; }
      .dia-item span { display: none; }
      .dia-check { display: none; }
      .contenido { padding: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <h1><span>▣</span> 30 Días JS</h1>
    <div class="dia-lista" id="diaLista"></div>
    <div class="progreso-bar">
      <div class="barra"><div class="llenado" id="llenado"></div></div>
      <div class="texto" id="progresoTexto">0 / 30 completados</div>
    </div>
  </nav>

  <main class="contenido" id="contenido">
    <div style="text-align:center;margin-top:4rem;color:#666">
      <h2 style="color:#666">30 Días de JavaScript</h2>
      <p>Seleccioná un día de la lista para ver la lección.</p>
    </div>
  </main>

  <button class="scroll-top" id="scrollTop">↑</button>

  <script src="lecciones.js"></script>
  <script src="app.js"></script>
</body>
</html>

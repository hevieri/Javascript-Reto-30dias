<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronómetro</title>
  <style>
    body { font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #2c3e50; }
    .cronometro { background: #34495e; padding: 2rem; border-radius: 1rem; text-align: center; }
    #display { font-size: 3rem; color: #2ecc71; }
    button { padding: 0.5rem 1rem; margin: 0.25rem; border: none; border-radius: 0.3rem; cursor: pointer; font-size: 1rem; }
    #btnIniciar { background: #2ecc71; }
    #btnPausar { background: #f39c12; }
    #btnReiniciar { background: #e74c3c; color: white; }
  </style>
</head>
<body>
  <div class="cronometro">
    <div id="display">00:00.0</div>
    <button id="btnIniciar">Iniciar</button>
    <button id="btnPausar">Pausar</button>
    <button id="btnReiniciar">Reiniciar</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
